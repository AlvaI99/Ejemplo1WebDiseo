<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Minimalista | Vista Dinámica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root {
            --header-bg: transparent; --header-text: #333333;
            --body-bg: #F4F3EE; --body-text: #333333;
            --footer-bg: #6B705C; --footer-text: #ffffff;
            --accent: #1A2E1F; 
            
            --font-title: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --radius: 0px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: var(--font-body); line-height: 1.6; background-color: var(--body-bg); color: var(--body-text); overflow-x: hidden; transition: opacity 0.5s; }
        body.loading { opacity: 0; pointer-events: none; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        img, iframe { display: block; max-width: 100%; border: none; }

        .container { max-width: 1265px; margin: 0 auto; padding: 0 2rem; }

        /* --- TOP NAV --- */
        .top-nav { padding: 2rem 0; }
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; max-width: 1265px; margin: 0 auto; padding: 0 4vw; }
        .site-title { font-family: var(--font-body); font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .back-link { font-weight: 600; font-size: 0.9rem; text-decoration: underline; text-underline-offset: 4px; display: none; cursor: pointer; }

        /* VISTAS PRINCIPALES */
        #portfolio-main-view, #project-page-view { transition: opacity 0.3s ease; }
        #project-page-view { display: none; opacity: 0; padding-top: 2rem; }
        #project-page-view.active { display: block; opacity: 1; }
        #portfolio-main-view.hidden { display: none; opacity: 0; }

        /* --- PORTFOLIO MAIN VIEW (Home) --- */
        header { background-color: var(--header-bg); color: var(--header-text); padding: 1rem 0 5rem; }
        .header-content { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .profile-photo { width: 100%; height: auto; aspect-ratio: 3/4; object-fit: cover; }
        .bio-text { font-family: var(--font-title); font-size: 1.4rem; line-height: 1.5; color: #444; }

        main { padding: 2rem 0 6rem; }
        .projects-wrapper { margin-left: auto; margin-right: 0; width: 100%; max-width: 565px; }
        #p-intro-section { text-align: left; margin: 0 0 4rem 0; width: 100%; font-size: 1.6rem; font-style: italic; font-family: var(--font-title); line-height: 1.3; color: var(--body-text); }
        .card { background: transparent; border-top: 1px solid rgba(0,0,0,0.2); padding: 3rem 0; cursor: pointer; transition: opacity 0.3s ease; display: grid; grid-template-columns: 1fr 240px; gap: 3rem; align-items: start; }
        .card:hover { opacity: 0.7; }
        .card-content { display: flex; flex-direction: column; align-items: flex-start; }
        .card-date { font-weight: 700; font-size: 0.75rem; letter-spacing: 0.5px; margin-bottom: 1rem; }
        .card-title { font-family: var(--font-title); font-size: 2.2rem; margin-bottom: 2rem; line-height: 1.1; font-weight: 400; }
        .read-btn { background-color: var(--accent); color: white; border: none; padding: 8px 16px; font-weight: 600; font-size: 0.75rem; }
        .card-thumb { aspect-ratio: 16/10; width: 100%; position: relative; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* --- FOOTER --- */
        footer { background-color: var(--footer-bg); color: var(--footer-text); padding: 3rem 0; border-top: 1px solid rgba(0,0,0,0.1); }
        .footer-content { display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.9rem; }
        .footer-left p { margin-bottom: 0.2rem; }
        .footer-left .site-title-footer { font-weight: 700; margin-bottom: 0.5rem; }
        .social-container { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .social-text-link { text-decoration: underline; text-underline-offset: 4px; font-weight: 600; }

        /* =========================================
           --- NUEVA VISTA DE PÁGINA DE PROYECTO ---
           ========================================= */
        #project-page-content { padding-bottom: 0; }

        /* Estilos Comunes de Sección */
        .project-section { padding: 4rem 0; border-top: 1px solid rgba(0,0,0,0.1); }
        .project-section:first-of-type { border-top: none; padding-top: 0; }
        
        .s-title { font-family: var(--font-title); font-size: 1.1rem; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; margin-bottom: 2rem; color: #666; }
        .s-text { font-family: var(--font-body); font-size: 1rem; color: #444; line-height: 1.7; white-space: pre-line; } /* pre-line respeta saltos de línea */
        
        .media-container { width: 100%; background: #e0e0e0; overflow: hidden; position: relative; }
        .media-container img { width: 100%; height: auto; object-fit: cover; }
        .media-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
        }
        /* Helpers para Proporciones de Multimedia */
        .ratio-16-9 { aspect-ratio: 16/9; }
        .ratio-3-4 { aspect-ratio: 3/4; }

	.dynamic-sections-wrapper {
            background-color: var(--footer-bg); /* Toma el verde oliva */
            color: var(--body-bg); /* Toma el crema */
            
            /* Truco para que el fondo ocupe el 100vw (toda la pantalla) saliendo del container */
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            padding: 4rem 0; 
        }
	
	.dynamic-sections-wrapper .project-section {
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 4vw;
            padding-right: 4vw;
            border-top: 1px solid rgba(255,255,255,0.1); /* Línea separadora casi transparente */
        }
        
        .dynamic-sections-wrapper .project-section:first-child { border-top: none; padding-top: 0; }

        /* Ajustamos los colores de los textos dentro de la zona verde */
        .dynamic-sections-wrapper .s-title { color: var(--body-bg); opacity: 0.9; }
        .dynamic-sections-wrapper .s-text { color: var(--body-bg); opacity: 0.9; }

        /* --- SECCIÓN 0: INTRO (Siempre igual) --- */
        .section-intro { display: grid; grid-template-columns: 1.2fr 1fr; gap: 5rem; align-items: start; padding-bottom: 6rem; }
        .intro-media { width: 100%; aspect-ratio: 3/4; }
        
        .intro-text-block .card-date { margin-bottom: 0.5rem; display: block; }
        .intro-text-block .card-title { font-size: 3.5rem; margin-bottom: 3rem; }
        .intro-text-block .s-text { font-size: 1.1rem; color: #333; }

        /* --- MODELO FULL (Media Ancho Completo) --- */
        .section-full { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; /* Todo empieza a la izquierda por defecto */
        }
        .section-full .s-title { 
            margin-bottom: 2rem; 
        }
        .section-full .media-container { 
            width: 100%; /* Ocupa todo el ancho seguro del contenedor */
            margin-bottom: 3rem; 
            background: #e0e0e0;
        }
        .section-full .s-text-block {
            align-self: flex-end; /* Empuja solo el bloque de texto hacia la derecha */
            width: 100%;
            max-width: 500px; /* Evita que el texto cruce toda la pantalla */
        }
        .section-full .s-text { 
            text-align: left; /* El texto en sí mantiene su lectura de izquierda a derecha */
        }
        /* --- MODELO GRID (Media Izquierda, Texto Derecha) --- */
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .section-grid .media-container { aspect-ratio: 16/10; }

        /* --- MODELO GRID REVERSED (Texto Izquierda, Media Derecha) --- */
        .section-grid-reversed { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .section-grid-reversed .media-container { order: 2; aspect-ratio: 16/10; }
        .section-grid-reversed .s-text-block { order: 1; }

        /* --- NAVEGACIÓN ENTRE PROYECTOS --- */
        .project-navigation { 
            background-color: var(--footer-bg); /* Fondo verde */
            padding: 4rem 0 6rem; 
            border-top: 1px solid rgba(255,255,255,0.2); /* Línea divisoria clara */
            
            /* Truco para que el fondo verde ocupe el 100vw saliendo del container */
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }
        
        .project-navigation .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 4vw;
        }

        .nav-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            gap: 2rem;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 320px; /* Tamaño reducido para la maqueta */
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .nav-item:hover { opacity: 0.7; }
        .nav-item.disabled { display: none; } /* Oculta el espacio si no hay proyecto anterior/siguiente */

        /* Empuja el proyecto 'Siguiente' a la derecha */
        #nav-next { margin-left: auto; }

        .nav-thumb {
            width: 100%;
            aspect-ratio: 16/10;
            background: #e0e0e0;
            margin-bottom: 1.5rem;
        }

        .nav-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .nav-title {
            font-family: var(--font-title);
            font-style: italic;
            font-weight: 400;
            color: var(--body-bg);
            font-size: 1.4rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .nav-arrow-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 35px;
            background-color: rgba(255, 255, 255, 0.1); /* Botón semitransparente */
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--body-bg);
            border-radius: 4px;
            font-size: 1.2rem;
            transition: background-color 0.3s;
        }

        .nav-item:hover .nav-arrow-btn { background-color: rgba(255, 255, 255, 0.2); }

	footer { 
            /* AQUÍ MODIFICAS EL TONO GRIS EXACTO QUE ELLA QUIERA */
            background-color: #8D9085; 
            color: #ffffff; 
            padding: 3rem 0; 
            border-top: none; /* Quitamos el borde para que no choque con la navegación */
        }
	/* --- BANNER DISCLAIMER --- */
        .project-banner {
            /* Ocupa todo el ancho de la pantalla */
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            
            padding: 3rem 4vw;
            text-align: center;
            font-family: var(--font-body);
            font-style: italic; /* Ideal para notas aclaratorias */
        }
        
        .project-banner-content {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .header-content, .section-intro, .section-grid, .section-grid-reversed { grid-template-columns: 1fr; gap: 2rem; }
            .profile-photo, .intro-media { aspect-ratio: auto; max-height: 60vh; width: 100%; object-fit: cover; }
            
            /* Ajuste de proyectos en home */
            .projects-wrapper { max-width: 100%; margin-left: 0; }
            .card { display: flex; flex-direction: column; gap: 0; padding: 2rem 0; }
            .card-thumb { order: -1; width: 85%; margin-left: auto; aspect-ratio: 16/10; margin-bottom: 1.5rem; }
            .card-content { width: 100%; }
            .card-title { font-size: 1.8rem; margin-bottom: 1.5rem; }

            /* Ajustes de página de proyecto */
            .intro-text-block .card-title { font-size: 2.5rem; margin-bottom: 1.5rem; }
            .section-full .media-container { width: 100%; left: 0; right: 0; margin-left: 0; margin-right: 0; }
            .section-grid-reversed .media-container { order: -1; }
            .section-grid-reversed .s-text-block { order: 0; }
            .nav-content { flex-direction: column; gap: 4rem; }
            .nav-item { max-width: 100%; }
            #nav-next { margin-left: 0; }
        }
    </style>
</head>
<body class="loading">

    <div class="top-nav">
        <div class="nav-wrapper">
            <h1 id="p-nombre" class="site-title">Cargando...</h1>
            <a id="back-to-portfolio" class="back-link" onclick="closeProjectPage()">← Volver</a>
        </div>
    </div>

    <div id="portfolio-main-view">
        <header>
            <div class="container header-content">
                <img id="p-foto" src="" alt="Perfil" class="profile-photo">
                <p class="bio-text" id="p-bio">...</p>
            </div>
        </header>
        <main>
            <div class="container">
                <div class="projects-wrapper">
                    <p id="p-intro-section"></p>
                    <div id="projects-container" class="projects-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="project-page-view">
        <div class="container" id="project-page-content">
            </div>
        
        <div class="project-navigation">
            <div class="container nav-content">
                <a id="nav-prev" class="nav-link">← Proyecto Anterior</a>
                <a id="nav-next" class="nav-link">Siguiente Proyecto →</a>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="container footer-content">
            <div class="footer-left">
                <p class="site-title-footer" id="p-nombre-footer">Claudia Liz</p>
                <p>Copyright © 2026</p>
                <p id="p-footer-text">claudializop@gmail.com</p> 
            </div>
            <div id="social-container" class="social-container"></div>
        </div>
    </footer>

    <script>
        const SHEET_ID = '1z7X1BK7JfClh0hNNLktqEFCh7m4Ispmrs9LWagZ3BS4'; 
        const URL_PERFIL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`; 
        const URL_PROYECTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=699907319`;

        let projectsData = [];
        let currentProjectIndex = -1;

        function init() {
            Papa.parse(URL_PERFIL, { download: true, header: true, complete: (res) => processProfile(res.data) });
            Papa.parse(URL_PROYECTOS, { download: true, header: true, skipEmptyLines: true, complete: (res) => { projectsData = res.data; renderProjects(projectsData); } });
        }

        function processProfile(data) {
            const perfil = {};
            data.forEach(row => { if(row['Clave (no tocar)']) perfil[row['Clave (no tocar)'].trim().toLowerCase()] = row['Valor']; });

            ['nombre', 'bio', 'intro_section'].forEach(key => {
                const idMap = { 'bio': 'p-bio', 'intro_section': 'p-intro-section', 'nombre': 'p-nombre' };
                const el = document.getElementById(idMap[key]);
                if(el && perfil[key]) el.innerHTML = perfil[key].replace(/\n/g, '<br>');
            });
            if(perfil.nombre) document.getElementById('p-nombre-footer').textContent = perfil.nombre;
            if(perfil.email) document.getElementById('p-footer-text').textContent = perfil.email;
            if(perfil.foto) {
                let fotoUrl = perfil.foto;
                // Si la foto viene de Drive, la convertimos a un enlace directo de imagen
                if (fotoUrl.includes('drive.google.com')) {
                    const match = fotoUrl.match(/\/d\/(.+?)\/|(?:id=)([^&]+)/);
                    const driveId = match ? (match[1] || match[2]) : null;
                    if (driveId) {
                        fotoUrl = `https://drive.google.com/uc?export=view&id=${driveId}`;
                    }
                }
                document.getElementById('p-foto').src = fotoUrl;
            }

            // Colores
            const root = document.documentElement.style;
            if(perfil.body_bg) root.setProperty('--body-bg', perfil.body_bg);
            if(perfil.body_text) root.setProperty('--body-text', perfil.body_text);
            if(perfil.footer_bg) root.setProperty('--footer-bg', perfil.footer_bg);
            if(perfil.footer_text) root.setProperty('--footer-text', perfil.footer_text);
            if(perfil.acento) root.setProperty('--accent', perfil.acento);

            // Redes
            const container = document.getElementById('social-container');
            ['linkedin', 'behance', 'instagram', 'whatsapp'].forEach(red => {
                if(perfil[red]) {
                    let href = red === 'whatsapp' ? `https://wa.me/${perfil[red].replace(/\D/g,'')}` : perfil[red];
                    container.innerHTML += `<a href="${href}" target="_blank" class="social-text-link">${red.charAt(0).toUpperCase() + red.slice(1)}</a>`;
                }
            });
            document.body.classList.remove('loading');
        }

        function renderProjects(data) {
            const container = document.getElementById('projects-container');
            container.innerHTML = data.map((p, index) => {
                if(!p.titulo) return '';
                // Placeholder seguro si no hay imagen
                const thumb = p.imagen || 'https://placehold.co/600x400/eeeeee/cccccc?text=Cargando...';
                
                return `
                <article class="card" onclick="openProjectPage(${index})">
                    <div class="card-content">
                        <span class="card-date">${p.fecha || ''}</span>
                        <h3 class="card-title">${p.titulo}</h3>
                        <button class="read-btn">Saber más</button>
                    </div>
                    <div class="card-thumb">
                        <img src="${thumb}" alt="${p.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/eeeeee/cccccc?text=Cargando...'">
                    </div>
                </article>
                `;
            }).join('');
        }

        /* --- LÓGICA DE LA PÁGINA DE PROYECTO --- */

        // Helper para generar el HTML del multimedia (Imagen, YouTube o Drive)
        function generateMediaHtml(url, ratioClass = 'ratio-16-9') {
            if(!url) return '';
            
            if(url.includes('youtu')) {
                const id = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/)?.[2];
                return `<div class="media-container ${ratioClass}"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
            } else if (url.includes('drive.google.com')) {
                const id = url.match(/\/d\/(.+?)\/|(?:id=)([^&]+)/)?.[1] || url.match(/\/d\/(.+?)\/|(?:id=)([^&]+)/)?.[2];
                return `<div class="media-container ${ratioClass}"><iframe src="https://drive.google.com/file/d/${id}/preview" allowfullscreen></iframe></div>`;
            } else {
                return `<div class="media-container ${ratioClass}"><img src="${url}" alt="Multimedia" onerror="this.onerror=null; this.src='https://placehold.co/600x400/eeeeee/cccccc?text=Error'"></div>`;
            }
        }

window.openProjectPage = function(index, fromHistory = false) {
            currentProjectIndex = index;
            const p = projectsData[index];
            if(!p) return;

            const contentContainer = document.getElementById('project-page-content');
            contentContainer.innerHTML = ''; 

            // --- SECCIÓN 0: INTRO ---
            const introHtml = `
                <section class="project-section section-intro">
                    <div class="media-container intro-media ratio-3-4">
                        <img src="${p.imagen}" alt="${p.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/600x800/eeeeee/cccccc?text=Intro'">
                    </div>
                    <div class="intro-text-block">
                        <span class="card-date">${p.fecha || ''}</span>
                        <h2 class="card-title">${p.titulo}</h2>
                        <div class="s-text">${p.desc_larga}</div>
                    </div>
                </section>
            `;
            contentContainer.innerHTML += introHtml;

            // --- BANNER DISCLAIMER (Opcional) ---
            if (p.banner_texto) {
                const bgBanner = p.banner_bg || '#EAEAEA'; 
                const colorBanner = p.banner_color || '#333333'; 
                const bannerHtml = `
                    <div class="project-banner" style="background-color: ${bgBanner}; color: ${colorBanner};">
                        <div class="project-banner-content">
                            ${p.banner_texto.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                contentContainer.innerHTML += bannerHtml;
            }

            // --- SECCIONES DINÁMICAS (Fondo Verde) ---
            let dynamicHtml = ''; 
            for (let i = 1; i <= 5; i++) {
                const tipo = p[`s${i}_tipo`]?.trim().toLowerCase();
                const titulo = p[`s${i}_titulo`];
                const mediaUrl = p[`s${i}_media`];
                const texto = p[`s${i}_texto`];

                if(!tipo) continue; 

                let sectionHtml = '';
                const titleHtml = titulo ? `<h3 class="s-title">${titulo}</h3>` : '';
                const textBlockHtml = texto ? `<div class="s-text-block"><div class="s-text">${texto}</div></div>` : '';
                const mediaHtml = generateMediaHtml(mediaUrl);

                if (tipo === 'full') {
                    sectionHtml = `
                        <section class="project-section section-full">
                            ${titleHtml}
                            ${generateMediaHtml(mediaUrl, 'ratio-16-9')}
                            ${textBlockHtml}
                        </section>
                    `;
                } else if (tipo === 'grid') {
                    sectionHtml = `
                        <section class="project-section section-grid">
                            ${mediaHtml}
                            <div class="s-text-block">
                                ${titleHtml}
                                ${texto ? `<div class="s-text">${texto}</div>` : ''}
                            </div>
                        </section>
                    `;
                } else if (tipo === 'grid_reversed') {
                    sectionHtml = `
                        <section class="project-section section-grid-reversed">
                            ${mediaHtml}
                            <div class="s-text-block">
                                ${titleHtml}
                                ${texto ? `<div class="s-text">${texto}</div>` : ''}
                            </div>
                        </section>
                    `;
                }
                dynamicHtml += sectionHtml; 
            }

            if (dynamicHtml !== '') {
                contentContainer.innerHTML += `<div class="dynamic-sections-wrapper">${dynamicHtml}</div>`;
            }

            // --- CONFIGURAR NAVEGACIÓN ---
            renderProjectNavigation(index);

            // --- NUEVO: REGISTRAR EN EL HISTORIAL DEL NAVEGADOR ---
            if (!fromHistory) {
                // Agrega '#proyecto-1' a la URL para que el navegador sepa que "avanzamos"
                history.pushState({ page: 'project', index: index }, p.titulo, `#proyecto-${index}`);
            }

            // Cambiar vistas
            document.getElementById('portfolio-main-view').classList.add('hidden');
            document.getElementById('project-page-view').classList.add('active');
            document.getElementById('back-to-portfolio').style.display = 'block';
            window.scrollTo(0, 0); 
        }

        window.closeProjectPage = function(fromHistory = false) {
            document.getElementById('portfolio-main-view').classList.remove('hidden');
            document.getElementById('project-page-view').classList.remove('active');
            document.getElementById('back-to-portfolio').style.display = 'none';
            currentProjectIndex = -1;
            window.scrollTo(0, 0);

            // --- NUEVO: LIMPIAR LA URL AL VOLVER AL HOME ---
            if (!fromHistory) {
                history.pushState({ page: 'home' }, "", window.location.pathname);
            }
        }
        
        function renderProjectNavigation(currentIndex) {
            const navContent = document.querySelector('.nav-content');
            let html = '';

            // Proyecto Anterior
            if (currentIndex > 0) {
                const prevProject = projectsData[currentIndex - 1];
                const thumb = prevProject.imagen || 'https://placehold.co/600x400/eeeeee/cccccc?text=Cargando...';
                
                html += `
                    <a id="nav-prev" class="nav-item" onclick="openProjectPage(${currentIndex - 1})">
                        <div class="nav-thumb">
                            <img src="${thumb}" alt="${prevProject.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/eeeeee/cccccc?text=Error'">
                        </div>
                        <h4 class="nav-title">${prevProject.titulo}</h4>
                        <div class="nav-arrow-btn">&larr;</div>
                    </a>
                `;
            }

            // Siguiente Proyecto
            if (currentIndex < projectsData.length - 1) {
                const nextProject = projectsData[currentIndex + 1];
                const thumb = nextProject.imagen || 'https://placehold.co/600x400/eeeeee/cccccc?text=Cargando...';
                
                html += `
                    <a id="nav-next" class="nav-item" onclick="openProjectPage(${currentIndex + 1})">
                        <div class="nav-thumb">
                            <img src="${thumb}" alt="${nextProject.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/eeeeee/cccccc?text=Error'">
                        </div>
                        <h4 class="nav-title">${nextProject.titulo}</h4>
                        <div class="nav-arrow-btn">&rarr;</div>
                    </a>
                `;
            }

            // Inyectamos todo el HTML nuevo en el contenedor
            navContent.innerHTML = html;
        }
	// 1. Al cargar la web, le decimos al navegador que estamos en la página "Home"
        history.replaceState({ page: 'home' }, "", window.location.pathname);

        // 2. Escuchamos cuando el usuario intenta retroceder o avanzar
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.page === 'project') {
                // Si retrocedemos hacia un proyecto anterior, lo abrimos sin alterar el historial (true)
                openProjectPage(event.state.index, true); 
            } else {
                // Si retrocedemos hasta el inicio, cerramos el proyecto y volvemos al Home
                closeProjectPage(true); 
            }
        });
        init();
    </script>
</body>
</html>
