<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        /* --- VARIABLES DINÁMICAS (Se llenan desde Excel) --- */
        :root {
            /* Colores por defecto (Safety net) */
            --header-bg: #111111;
            --header-text: #ffffff;
            --body-bg: #ffffff;
            --body-text: #333333;
            --footer-bg: #111111;
            --footer-text: #aaaaaa;
            --accent: #ccff00;
            
            --font-title: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-body); 
            line-height: 1.6; 
            overflow-x: hidden;
            transition: opacity 0.5s;
        }
        body.loading { opacity: 0; pointer-events: none; }
        
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        img { display: block; max-width: 100%; }

        /* --- HEADER --- */
        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 5rem 2rem;
            position: relative;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header-content {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .profile-info h1 {
            font-family: var(--font-title);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .role-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 5px 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
        }

        .bio-text {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        /* Stats Grid (Restaurado) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item small {
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .stat-item strong {
            font-size: 1.1rem;
            font-family: var(--font-title);
        }

        .profile-photo-container {
            position: relative;
        }
        
        .profile-photo {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            box-shadow: 15px 15px 0 rgba(0,0,0,0.2);
        }

        /* --- BODY (PROYECTOS) --- */
        main {
            background-color: var(--body-bg);
            color: var(--body-text);
            padding: 4rem 2rem 6rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .card {
            background: rgba(0,0,0,0.03);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card-thumb {
            aspect-ratio: 16/9;
            background: #ddd;
            position: relative;
            overflow: hidden;
        }

        .card-thumb img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s;
        }
        
        .card:hover .card-thumb img { transform: scale(1.05); }

        .play-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .card-body { padding: 1.5rem; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .card-date { 
        background: var(--accent);
        color: #000;
        padding: 4px 10px;
        border-radius: 4px;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: inline-block;
        }
        
        .card-title {
            font-family: var(--font-title);
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--footer-bg);
            color: var(--footer-text);
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .social-container {
            display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; flex-wrap: wrap;
        }

        .social-btn {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: 0.3s;
            color: var(--footer-text);
        }
        
        .social-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            transform: translateY(-3px);
        }

        .whatsapp-btn {
            background: #25D366; border-color: #25D366; color: white !important; font-weight: bold;
        }
        .whatsapp-btn:hover { background: #128C7E; border-color: #128C7E; }

        /* --- MODAL (CARRUSEL RESTAURADO) --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            opacity: 0; pointer-events: none;
            transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
            padding: 1rem;
        }
        .modal.active { opacity: 1; pointer-events: all; }

        .modal-container {
            width: 100%; max-width: 1000px;
            background: #111;
            border-radius: var(--radius);
            overflow: hidden;
            display: flex; flex-direction: column;
            max-height: 90vh;
            border: 1px solid #333;
        }

        .carousel-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
            width: 100%;
        }

        .slide { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .slide.active { display: flex; }
        .slide img { max-height: 100%; width: auto; }
        .slide iframe { width: 100%; height: 100%; border: none; }

        .c-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white;
            border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem; z-index: 10;
        }
        .c-btn:hover { background: var(--accent); color: black; }
        .c-prev { left: 1rem; }
        .c-next { right: 1rem; }

        .modal-details { padding: 2rem; overflow-y: auto; color: #fff; }
        .close-modal {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.2); color: white;
            border: none; width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; z-index: 20;
        }
        .close-modal:hover { background: red; }

        /* Responsive */
        @media (max-width: 768px) {
        .header-content { 
            display: flex; 
            flex-direction: column-reverse; /* Esto sube la foto */
            text-align: center; 
            gap: 2rem; 
        }
        .profile-photo { width: 200px; margin: 0 auto; }
        .stats-grid { text-align: left; }
        .carousel-wrapper { aspect-ratio: 1/1; }
    }
    </style>
</head>
<body class="loading">

    <header>
        <div class="container header-content">
            <div class="profile-info">
                <span class="role-badge" id="p-rol">Cargando...</span>
                <h1 id="p-nombre">...</h1>
                <p class="bio-text" id="p-bio">...</p>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <small>Ubicación</small>
                        <strong id="p-ubicacion">-</strong>
                    </div>
                    <div class="stat-item">
                        <small>Experiencia</small>
                        <strong id="p-experiencia">-</strong>
                    </div>
                    <div class="stat-item">
                        <small>Especialidad</small>
                        <strong id="p-especialidad">-</strong>
                    </div>
                    <div class="stat-item">
                        <small>Disponibilidad</small>
                        <strong id="p-disponibilidad" style="color: var(--accent);">-</strong>
                    </div>
                </div>
            </div>
            
            <div class="profile-photo-container">
                <img id="p-foto" src="" alt="Perfil" class="profile-photo">
            </div>
        </div>
    </header>

    <main>
        <div class="container">
        <p id="p-intro-section" style="font-size: 1.2rem; margin-bottom: 3rem; max-width: 800px;"></p>

        <h2 style="margin-bottom: 2rem; font-family: var(--font-title);">Mis Proyectos</h2>
        <div id="projects-container" class="projects-grid">
            </div>
    </div>
        <div class="container">
            <h2 style="margin-bottom: 2rem; font-family: var(--font-title);">Mis Proyectos</h2>
            <div id="projects-container" class="projects-grid">
                </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <h3 style="margin-bottom: 0.5rem; color: var(--accent);">Hablemos</h3>
            <p id="p-footer-text" style="margin-bottom: 2rem;">¿Tienes una idea? Creemos algo increíble.</p> 
            
            <div id="social-container" class="social-container">
                </div>
            
            <p style="margin-top: 4rem; opacity: 0.5; font-size: 0.8rem;">© 2026 Portafolio.</p>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="carousel-wrapper">
                <button class="close-modal" onclick="closeModal()">×</button>
                <button class="c-btn c-prev" onclick="moveSlide(-1)">❮</button>
                <div id="carousel-track" style="width: 100%; height: 100%;"></div>
                <button class="c-btn c-next" onclick="moveSlide(1)">❯</button>
            </div>
            <div class="modal-details">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <h2 id="m-title" style="margin:0; font-family: var(--font-title);"></h2>
                    <span id="m-date" style="color: var(--accent); font-family: monospace;"></span>
                </div>
                <p id="m-desc" style="white-space: pre-line; color: #ccc;"></p>
            </div>
        </div>
    </div>
    
    <script>
        // --- CONFIGURACIÓN ---
        // Pega aquí el ID de tu Google Sheet
        const SHEET_ID = '1z7X1BK7JfClh0hNNLktqEFCh7m4Ispmrs9LWagZ3BS4'; 
        const GID_PROYECTOS = '699907319';
        
        // --- LÓGICA ---
        const URL_PERFIL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`; 
        const URL_PROYECTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_PROYECTOS}`;

        let projectsData = [];
        let currentSlides = [];
        let currentSlideIndex = 0;

        // Iconos SVG simples
        const ICONS = {
            instagram: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>`,
            whatsapp: `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>`,
            behance: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7H17V9H22V7ZM23.73 17C23.29 18.3 21.7 20 18.63 20C15.56 20 13.07 18.27 13.07 14.33C13.07 10.42 15.39 8.41 18.53 8.41C21.61 8.41 23.49 10.19 23.9 12.83C23.98 13.34 24.01 14.02 24 14.97H15.97C16.1 18.18 19.45 18.28 20.56 17H23.73ZM16.04 13H21.01C20.9 11.45 19.87 10.78 18.53 10.78C17.06 10.78 16.25 11.55 16.04 13ZM6.47 13.99H2.88V6.99H6.47C8.98 6.99 9.38 3.99 6.16 3.99H2.89V1H6.38V3.99C9.44 3.99 9.25 .97 6.4 1"></path></svg>`,
            linkedin: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`,
            email: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`,
            default: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`
        };

       function init() {
            Papa.parse(URL_PERFIL, {
                download: true, header: true,
                complete: (res) => processProfile(res.data)
            });
            Papa.parse(URL_PROYECTOS, {
                download: true, header: true, skipEmptyLines: true,
                complete: (res) => renderProjects(res.data)
            });
        }

        function processProfile(data) {
            const perfil = {};
            data.forEach(row => {
                if(row['Clave (no tocar)']) perfil[row['Clave (no tocar)'].trim().toLowerCase()] = row['Valor'];
            });

            // Textos Simples
            ['nombre', 'rol', 'ubicacion', 'experiencia', 'especialidad', 'disponibilidad', 'bio', 'intro_section'].forEach(key => {
                if(perfil[key]) {
                   const idMap = {
                        'bio': 'p-bio',
                        'intro_section': 'p-intro-section'
                    };
                    const elId = idMap[key] || `p-${key}`;
                    const el = document.getElementById(elId);
                    if(el) el.textContent = perfil[key];
                }
            });
            
            if (document.getElementById('p-footer-text')) {
                document.getElementById('p-footer-text').textContent = perfil.footer_text || "¿Tienes una idea? Creemos algo increíble.";}
            
            if(perfil.foto) document.getElementById('p-foto').src = perfil.foto;

            // --- APLICAR COLORES POR SECCIÓN ---
            const root = document.documentElement.style;
            if(perfil.header_bg) root.setProperty('--header-bg', perfil.header_bg);
            if(perfil.header_text) root.setProperty('--header-text', perfil.header_text);
            
            if(perfil.body_bg) root.setProperty('--body-bg', perfil.body_bg);
            if(perfil.body_text) root.setProperty('--body-text', perfil.body_text);
            
            if(perfil.footer_bg) root.setProperty('--footer-bg', perfil.footer_bg);
            if(perfil.footer_text) root.setProperty('--footer-text', perfil.footer_text);
            
            if(perfil.acento) root.setProperty('--accent', perfil.acento);

            // --- REDES SOCIALES & WHATSAPP ---
            const socialContainer = document.getElementById('social-container');
            const redes = ['whatsapp', 'email', 'instagram', 'behance', 'linkedin', 'tiktok'];
            
            redes.forEach(red => {
                if(perfil[red]) {
                    let href = perfil[red];
                    let btnClass = 'social-btn';
                    let label = red;

                    if(red === 'whatsapp') {
                        // Limpiar número y crear link api
                        const num = perfil[red].replace(/\D/g,'');
                        href = `https://wa.me/${num}`;
                        btnClass += ' whatsapp-btn';
                        label = 'WhatsApp';
                    } else if (red === 'email') {
                        href = `mailto:${perfil[red]}`;
                    }

                    const icon = ICONS[red] || ICONS.default;
                    
                    socialContainer.innerHTML += `
                        <a href="${href}" target="_blank" class="${btnClass}">
                            ${icon} <span>${label.charAt(0).toUpperCase() + label.slice(1)}</span>
                        </a>`;
                }
            });
            document.body.classList.remove('loading');
        }

        function renderProjects(data) {
            projectsData = data;
            const container = document.getElementById('projects-container');
            
            container.innerHTML = data.map((p, index) => {
                if(!p.titulo) return '';
                
                // Procesar imagen principal o miniatura video
                const mediaList = p.galeria ? p.galeria.split(',') : [p.imagen];
                const firstMedia = mediaList[0].trim();
                const isVideo = firstMedia.includes('youtu');
                const thumb = isVideo ? getYouTubeThumb(firstMedia) : firstMedia;
                
                return `
                <article class="card" onclick="openModal(${index})">
                    <div class="card-thumb">
                        <img src="${thumb}" alt="${p.titulo}">
                        ${isVideo ? '<div class="play-icon">▶</div>' : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <span class="card-date">${p.fecha || ''}</span>
                        </div>
                        <h3 class="card-title">${p.titulo}</h3>
                        <p>${p.desc_corta || ''}</p>
                    </div>
                </article>
                `;
            }).join('');
        }

        /* --- LÓGICA DE VIDEO Y CARRUSEL --- */
        function getYouTubeID(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function getYouTubeThumb(url) {
            const id = getYouTubeID(url);
            return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : url;
        }

        window.openModal = function(index) {
            const p = projectsData[index];
            currentSlides = p.galeria ? p.galeria.split(',').map(s => s.trim()) : [p.imagen];
            currentSlideIndex = 0;

            document.getElementById('m-title').textContent = p.titulo;
            document.getElementById('m-date').textContent = p.fecha;
            document.getElementById('m-desc').textContent = p.desc_larga;

            renderSlide();
            
            // Ocultar flechas si solo hay 1 slide
            const btns = document.querySelectorAll('.c-btn');
            btns.forEach(b => b.style.display = currentSlides.length > 1 ? 'block' : 'none');

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function renderSlide() {
            const track = document.getElementById('carousel-track');
            const url = currentSlides[currentSlideIndex];
            
            let content = '';
            if(url.includes('youtu')) {
                const id = getYouTubeID(url);
                content = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            } else {
                content = `<img src="${url}">`;
            }
            
            track.innerHTML = `<div class="slide active">${content}</div>`;
        }

        window.moveSlide = function(dir) {
            currentSlideIndex = (currentSlideIndex + dir + currentSlides.length) % currentSlides.length;
            renderSlide();
        }

        window.closeModal = function() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('carousel-track').innerHTML = ''; // Parar video
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modal')) closeModal();
        });

        init();

    </script>
</body>
</html>
