<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
       /* --- ESTILOS GENERALES --- */
        :root {
            --bg-color: #0f0f11;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --text-sec: #a1a1aa;
            --accent: #d4f84c;
            --font-main: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-main); line-height: 1.6; transition: opacity 0.5s; }
        body.loading { opacity: 0; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* HEADER */
        header { padding: 4rem 0; display: grid; grid-template-columns: 1fr 2fr; gap: 3rem; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-photo { width: 100%; aspect-ratio: 1; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .header-photo img { width: 100%; height: 100%; object-fit: cover; }
        .header-info h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.5rem;}
        .role-tag { color: var(--accent); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; display: block; margin-bottom: 2rem;}
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: rgba(255,255,255,0.03); padding: 2rem; border-radius: 12px; }
        .info-item small { color: var(--text-sec); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.3rem; }
        
        /* PROYECTOS */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; padding: 4rem 0; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--accent); }
        .card-img { height: 240px; overflow: hidden; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img img { transform: scale(1.05); }
        /* Icono superpuesto si es video */
        .play-icon { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:3rem; color:white; text-shadow:0 0 10px rgba(0,0,0,0.5); opacity:0.8; }
        .card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-date { background: #000; color: var(--text-sec); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; align-self: flex-start; margin-bottom: 1rem; }
        .card-title { font-size: 1.4rem; margin-bottom: 0.5rem; font-weight: 700; }
        .card-desc { font-size: 0.95rem; color: var(--text-sec); }
        .card-link {display: inline-block;color: var(--accent);font-weight: 600;border-bottom: 1px solid transparent;}
        /* FOOTER & REDES */
        footer { text-align: center; padding: 4rem 0; border-top: 1px solid rgba(255,255,255,0.1); color: var(--text-sec); }
        .social-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; flex-wrap: wrap; }
        .social-btn { 
            width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.3s; color: white; border: 1px solid transparent;
        }
        .social-btn:hover { background: var(--accent); color: black; transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        .social-btn svg { width: 24px; height: 24px; fill: currentColor; }
         /* INTRO --- */
        .intro-section { padding: 4rem 0 2rem; text-align: center; max-width: 700px; margin: 0 auto; }
        .intro-section p { font-size: 1.25rem; color: var(--text-sec); }
        /* MODAL & CARRUSEL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: #151518; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 0; border-radius: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        
        /* Contenedor Multimedia */
        .carousel-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; }
        .carousel-slide { width: 100%; height: 100%; display: none; }
        .carousel-slide.active { display: block; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: contain; }
        .carousel-slide iframe { width: 100%; height: 100%; border: none; }
        
        /* Botones Carrusel */
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 1rem; cursor: pointer; font-size: 1.5rem; z-index: 10; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .carousel-btn:hover { background: var(--accent); color: black; }
        .carousel-btn.prev { left: 1rem; }
        .carousel-btn.next { right: 1rem; }
        .carousel-counter { position: absolute; bottom: 1rem; right: 1rem; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; color: white; }

        .modal-text { padding: 2rem; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; font-size: 2rem; color: white; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { background: #ff4d4d; }

        @media (max-width: 768px) {
            header { grid-template-columns: 1fr; text-align: center; gap: 2rem; }
            .header-photo { width: 180px; margin: 0 auto; }
            .info-grid { text-align: left; }
            .carousel-btn { padding: 0.5rem; width: 40px; height: 40px; font-size: 1rem; }
        }
    </style>
</head>
<body class="loading">

    <div class="container">
        <header>
            <div class="header-photo">
                <img id="p-foto" src="" alt="Perfil">
            </div>
            <div class="header-info">
                <h1 id="p-nombre">Cargando...</h1>
                <span id="p-rol" class="role-tag"></span>
                
                <div class="info-grid">
                    <div class="info-item"><small>Ubicación</small><p id="p-ubicacion"></p></div>
                    <div class="info-item"><small>Experiencia</small><p id="p-experiencia"></p></div>
                    <div class="info-item"><small>Especialidad</small><p id="p-especialidad"></p></div>
                    <div class="info-item"><small>Disponibilidad</small><p id="p-disponibilidad"></p></div>
                </div>
            </div>
        </header>
         <section class="intro-section">
            <p>
                Bienvenido a mi espacio creativo. Aquí combino estrategia visual con estética funcional. 
                Explora mis últimos trabajos donde la simplicidad se encuentra con el impacto.
            </p>
        </section>
        <div id="projects-container" class="projects-grid"></div>

        <footer>
            <h3>Contacto</h3>
            <p id="p-contacto-texto" style="margin: 0.5rem 0 1.5rem;"></p>
            <div id="social-container" class="social-links">
                </div>
            <p style="margin-top: 3rem; font-size: 0.8rem; opacity: 0.5;">© Portafolio 2024</p>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            
            <div class="carousel-container">
                <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>
                <div id="carousel-track" style="width: 100%; height: 100%;">
                    </div>
                <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
                <div class="carousel-counter" id="carousel-counter">1/1</div>
            </div>

            <div class="modal-text">
                <span id="m-date" style="color:var(--accent); font-family:monospace; display:block; margin-bottom:0.5rem;"></span>
                <h2 id="m-title" style="font-size:2rem; margin-bottom:1rem; color: white;"></h2>
                <p id="m-desc" style="white-space: pre-line; color: #ddd;"></p>
            </div>
        </div>
    </div>

        let projectsData = [];
        let currentSlides = [];
        let currentSlideIndex = 0;

        function init() {
            // Cargar Perfil
            Papa.parse(URL_PERFIL, {
                download: true,
                header: false, // La hoja perfil es Clave-Valor
                complete: function(results) {
                    applyProfile(results.data);
                }
            });

            // Cargar Proyectos
            Papa.parse(URL_PROYECTOS, {
                download: true,
                header: true, // Usa la primera fila como cabeceras
                skipEmptyLines: true,
                complete: function(results) {
                    projectsData = results.data;
                    renderProjects(projectsData);
                    document.body.classList.remove('loading');
                }
            });
        }

        function applyProfile(data) {
    const perfil = {};
    data.forEach(row => { 
        // Solo procesa si la celda A tiene texto y no es un separador como "---"
        if(row[0] && !row[0].startsWith('---')) { 
            perfil[row[0].trim().toLowerCase()] = row[1] ? row[1].trim() : ""; 
        } 
    });

    // 1. Textos y Fotos
    setText('p-nombre', perfil.nombre);
    setText('p-rol', perfil.rol);
    setText('p-ubicacion', perfil.ubicacion);
    setText('p-experiencia', perfil.experiencia);
    setText('p-especialidad', perfil.especialidad);
    setText('p-disponibilidad', perfil.disponibilidad);
    
    if(perfil.foto) document.getElementById('p-foto').src = perfil.foto;

    // 2. Lógica de Contacto (Footer)
    if(perfil.telefono || perfil.email) {
        setText('p-contacto-texto', `También puedes escribirme a: ${perfil.telefono || ''} ${perfil.email || ''}`);
    }

    // 3. Colores y Estilos Dinámicos
    const root = document.documentElement.style;
    if(perfil.color_acento) root.setProperty('--accent', perfil.color_acento);
    if(perfil.color_fondo) root.setProperty('--bg-color', perfil.color_fondo);
    if(perfil.color_texto) root.setProperty('--text-main', perfil.color_texto);
    
    // Aplicar el border-radius que pusiste en la fila 24
    if(perfil['headerphoto_border-radius'] !== undefined) {
        const radius = perfil['headerphoto_border-radius'] || '50%'; // 50% por defecto si está vacío
        document.querySelector('.header-photo').style.borderRadius = radius.includes('%') ? radius : radius + 'px';
    }

    // 4. Redes Sociales
    const socialContainer = document.getElementById('social-container');
    socialContainer.innerHTML = '';
    const redes = ['instagram', 'tiktok', 'facebook', 'linkedin', 'behance', 'whatsapp', 'email'];

    redes.forEach(red => {
        let link = perfil[red];
        if(link && link.length > 5) { // Solo si hay un link real
            if(red === 'email') link = `mailto:${link}`;
            if(red === 'whatsapp') link = `https://wa.me/${link.replace(/\+/g,'').replace(/\s/g,'')}`;
            
            const iconPath = ICONS[red] || ICONS.email;
            socialContainer.innerHTML += `
                <a href="${link}" target="_blank" class="social-btn" title="${red}">
                    <svg viewBox="0 0 24 24">${iconPath}</svg>
                </a>`;
        }
    });
}

        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            container.innerHTML = projects.map((p, index) => {
                // Obtener primera imagen para la portada
                const firstImg = p.galeria ? p.galeria.split(',')[0].trim() : '';
                // Detectar si es video de youtube para poner icono
                const isVideo = firstImg.includes('youtube') || firstImg.includes('youtu.be');
                const thumbnail = isVideo ? getYouTubeThumb(firstImg) : firstImg;
                const iconOverlay = isVideo ? '<div class="play-icon">▶</div>' : '';

                return `
                <article class="card" onclick="openModal(${index})">
                    <div class="card-img">
                        <img src="${thumbnail}" loading="lazy" alt="${p.titulo}">
                        ${iconOverlay}
                    </div>
                    <div class="card-body">
                        <span class="card-date">${p.fecha}</span>
                        <h3 class="card-title">${p.titulo}</h3>
                        <p class="card-desc">${p.desc_corta}</p>
                        <span class="card-link">Ver detalles &rarr;</span>
                    </div>
                </article>
            `}).join('');
        }

        /* --- LÓGICA DEL CARRUSEL --- */
        
        window.openModal = function(index) {
            const p = projectsData[index];
            
            // Preparar Textos
            document.getElementById('m-title').textContent = p.titulo;
            document.getElementById('m-date').textContent = p.fecha;
            document.getElementById('m-desc').textContent = p.desc_larga;

            // Preparar Slides (Separa por comas)
            const rawLinks = p.galeria ? p.galeria.split(',') : [];
            currentSlides = rawLinks.map(l => l.trim()).filter(l => l.length > 0);
            
            if(currentSlides.length === 0) currentSlides = ['https://via.placeholder.com/800x400?text=Sin+Imagen'];
            
            currentSlideIndex = 0;
            renderSlide(currentSlideIndex);

            // Mostrar/Ocultar botones si solo hay 1 imagen
            const displayBtn = currentSlides.length > 1 ? 'flex' : 'none';
            document.querySelectorAll('.carousel-btn').forEach(b => b.style.display = displayBtn);

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function renderSlide(index) {
            const track = document.getElementById('carousel-track');
            const url = currentSlides[index];
            const counter = document.getElementById('carousel-counter');
            
            // Detectar si es video
            let html = '';
            if(url.includes('youtube') || url.includes('youtu.be')) {
                const videoId = getYouTubeID(url);
                html = `<iframe src="https://www.youtube.com/embed/${videoId}?rel=0" allowfullscreen></iframe>`;
            } else {
                html = `<img src="${url}" alt="Proyecto">`;
            }

            track.innerHTML = `<div class="carousel-slide active">${html}</div>`;
            counter.textContent = `${index + 1} / ${currentSlides.length}`;
        }

        window.moveSlide = function(direction) {
            currentSlideIndex += direction;
            if(currentSlideIndex >= currentSlides.length) currentSlideIndex = 0;
            if(currentSlideIndex < 0) currentSlideIndex = currentSlides.length - 1;
            renderSlide(currentSlideIndex);
        }

        /* --- UTILIDADES --- */
        function setText(id, text) { const el = document.getElementById(id); if(el && text) el.textContent = text; }
        
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function getYouTubeThumb(url) {
            const id = getYouTubeID(url);
            return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : url;
        }

        window.closeModal = function() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('carousel-track').innerHTML = ''; // Detener video
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modal')) closeModal();
        });

        init();
    </script>
</body>
