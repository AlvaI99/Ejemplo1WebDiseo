<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        /* --- ESTILOS MODERNOS (CSS) --- */
        :root {
            /* Valores por defecto (se sobreescriben con Google Sheets) */
            --bg-color: #0f0f11;
            --card-bg: rgba(255,255,255,0.05);
            --text-main: #ffffff;
            --text-sec: #a1a1aa;
            --accent: #d4f84c;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            transition: opacity 0.5s ease;
        }

        body.loading { opacity: 0; } /* Ocultar hasta cargar datos */

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* Header Grid */
        header {
            padding: 4rem 0;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-photo {
            width: 100%; aspect-ratio: 1; 
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .header-photo img { width: 100%; height: 100%; object-fit: cover; }

        .header-info h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.5rem;}
        .role-tag { color: var(--accent); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; display: block; margin-bottom: 2rem;}

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
            background: rgba(255,255,255,0.03); padding: 2rem; border-radius: 12px;
        }
        .info-item small { color: var(--text-sec); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.3rem; }
        .info-item p { font-size: 1.1rem; font-weight: 500; }

        /* Grid de Proyectos */
        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem; padding: 4rem 0;
        }

        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--accent); }

        .card-img { height: 240px; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img img { transform: scale(1.05); }

        .card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-date { background: #000; color: var(--text-sec); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; align-self: flex-start; margin-bottom: 1rem; }
        .card-title { font-size: 1.4rem; margin-bottom: 0.5rem; font-weight: 700; }
        .card-desc { font-size: 0.95rem; color: var(--text-sec); line-height: 1.5; }

        /* Footer */
        footer { text-align: center; padding: 4rem 0; border-top: 1px solid rgba(255,255,255,0.1); color: var(--text-sec); }
        .contact-pill { display: inline-block; background: var(--accent); color: #000; padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: bold; margin-top: 1rem; text-decoration: none; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999;
            opacity: 0; visibility: hidden; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; padding: 1rem;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: #151518; max-width: 900px; width: 100%; max-height: 90vh;
            overflow-y: auto; padding: 2.5rem; border-radius: 20px; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 2rem; color: white; background: none; border: none; cursor: pointer; }
        
        /* Responsive */
        @media (max-width: 768px) {
            header { grid-template-columns: 1fr; text-align: center; gap: 2rem; }
            .header-photo { width: 180px; margin: 0 auto; }
            .info-grid { text-align: left; }
            .header-info h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body class="loading">

    <div class="container">
        <header>
            <div class="header-photo">
                <img id="p-foto" src="" alt="Perfil">
            </div>
            <div class="header-info">
                <h1 id="p-nombre">Cargando...</h1>
                <span id="p-rol" class="role-tag"></span>
                
                <div class="info-grid">
                    <div class="info-item"><small>Ubicación</small><p id="p-ubicacion"></p></div>
                    <div class="info-item"><small>Experiencia</small><p id="p-experiencia"></p></div>
                    <div class="info-item"><small>Especialidad</small><p id="p-especialidad"></p></div>
                    <div class="info-item"><small>Disponibilidad</small><p id="p-disponibilidad"></p></div>
                </div>
            </div>
        </header>

        <div id="projects-container" class="projects-grid"></div>

        <footer>
            <h3>Contacto</h3>
            <p id="p-contacto-info" style="margin-top:0.5rem"></p>
            <a href="#" id="p-email-btn" class="contact-pill">Enviar Correo</a>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <img id="m-img" src="" style="width:100%; border-radius:12px; margin-bottom:1.5rem;">
            <span id="m-date" style="color:var(--accent); font-family:monospace;"></span>
            <h2 id="m-title" style="font-size:2rem; margin-bottom:1rem;"></h2>
            <p id="m-desc" style="white-space: pre-line; color: #ddd;"></p>
        </div>
    </div>

    <script>
        /* =========================================
           TU CONFIGURACIÓN AQUÍ
           Pega el ID de tu Google Sheet abajo.
        ========================================= */
        const SHEET_ID = '2PACX-1vQ1L9J7l0K9qwbLXws31AnbfJVwJVTTOuC_V9BHL_TyfhJuNQlPH0Ugp1WBhUMU_44wGVBeQQGb2Cip'; 

        // URLs mágicas de Google Visualization API (Mejor que CSV directo)
        const URL_PERFIL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Perfil`;
        const URL_PROYECTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Proyectos`;

        let projectsData = [];

        function init() {
            // Cargar Perfil
            Papa.parse(URL_PERFIL, {
                download: true,
                header: false, // La hoja perfil es Clave-Valor
                complete: function(results) {
                    applyProfile(results.data);
                }
            });

            // Cargar Proyectos
            Papa.parse(URL_PROYECTOS, {
                download: true,
                header: true, // Usa la primera fila como cabeceras
                skipEmptyLines: true,
                complete: function(results) {
                    projectsData = results.data;
                    renderProjects(projectsData);
                    document.body.classList.remove('loading');
                }
            });
        }

        function applyProfile(data) {
            // Convertimos el array de filas en un objeto simple { clave: valor }
            const perfil = {};
            data.forEach(row => {
                if(row[0] && row[1]) perfil[row[0].trim()] = row[1];
            });

            // Inyectar textos
            setText('p-nombre', perfil.nombre);
            setText('p-rol', perfil.rol);
            setText('p-ubicacion', perfil.ubicacion);
            setText('p-experiencia', perfil.experiencia);
            setText('p-especialidad', perfil.especialidad);
            setText('p-disponibilidad', perfil.disponibilidad);
            setText('p-contacto-info', `${perfil.telefono}`);
            
            // Imagen
            if(perfil.foto) document.getElementById('p-foto').src = perfil.foto;
            
            // Botón Email
            document.getElementById('p-email-btn').href = `mailto:${perfil.email}`;

            // Colores (CSS Variables)
            const root = document.documentElement.style;
            if(perfil.color_acento) root.setProperty('--accent', perfil.color_acento);
            if(perfil.color_fondo) root.setProperty('--bg-color', perfil.color_fondo);
            if(perfil.color_texto) root.setProperty('--text-main', perfil.color_texto);
        }

        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            container.innerHTML = projects.map((p, index) => `
                <article class="card" onclick="openModal(${index})">
                    <div class="card-img">
                        <img src="${p.imagen}" loading="lazy" alt="${p.titulo}">
                    </div>
                    <div class="card-body">
                        <span class="card-date">${p.fecha}</span>
                        <h3 class="card-title">${p.titulo}</h3>
                        <p class="card-desc">${p.desc_corta}</p>
                    </div>
                </article>
            `).join('');
        }

        // Helpers
        function setText(id, text) {
            const el = document.getElementById(id);
            if(el && text) el.textContent = text;
        }

        // Modal Logic
        const modal = document.getElementById('modal');
        
        window.openModal = function(index) {
            const p = projectsData[index];
            document.getElementById('m-img').src = p.imagen;
            document.getElementById('m-title').textContent = p.titulo;
            document.getElementById('m-date').textContent = p.fecha;
            document.getElementById('m-desc').textContent = p.desc_larga;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = function() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });

        // Arrancar
        init();
    </script>
</body>
</html>
</body>

</html>
