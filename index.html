<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Portafolio...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@300;500;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        /* --- 1. VARIABLES DINÁMICAS (SE SOBREESCRIBEN CON JS) --- */
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-sec: #666666;
            --accent: #000000;
            --card-bg: #f4f4f5;
            --radius: 12px;
            
            --font-title: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --spacing-unit: 1rem;
            --container-width: 1200px;
        }

        /* --- 2. RESET Y BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-body); 
            line-height: 1.6; 
            overflow-x: hidden;
            transition: opacity 0.4s ease;
        }

        body.loading { opacity: 0; pointer-events: none; }

        h1, h2, h3, h4 { font-family: var(--font-title); line-height: 1.1; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        img { max-width: 100%; display: block; }

        .container { 
            max-width: var(--container-width); 
            margin: 0 auto; 
            padding: 0 2rem; 
        }

        /* --- 3. ANIMACIONES (Del estilo "Muestra") --- */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 4. HEADER & HERO --- */
        header {
            padding: 6rem 0 4rem;
            position: relative;
        }
        
        /* Patrón de fondo sutil opcional */
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--text-sec) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.07;
            pointer-events: none;
            z-index: -1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .profile-photo {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius);
            box-shadow: 20px 20px 0px var(--accent); /* Efecto gráfico */
            transition: transform 0.5s;
        }
        .profile-photo:hover { transform: scale(0.98) translate(5px, 5px); box-shadow: 10px 10px 0px var(--accent); }

        .hero-text h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .hero-role {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 2rem;
            display: block;
        }

        .hero-bio {
            font-size: 1.1rem;
            color: var(--text-sec);
            max-width: 500px;
            margin-bottom: 2rem;
        }

        .social-links { display: flex; gap: 1rem; }
        .social-btn {
            width: 45px; height: 45px;
            border: 1px solid var(--text-main);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .social-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--bg-color); }

        /* --- 5. GRID DE PROYECTOS --- */
        .projects-section { padding: 4rem 0 8rem; }
        .section-title { margin-bottom: 3rem; font-size: 2rem; position: relative; display: inline-block; }
        .section-title::after { content:''; position: absolute; bottom: -10px; left: 0; width: 50%; height: 3px; background: var(--accent); }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 3rem;
        }

        .project-card {
            group;
            cursor: pointer;
            transition: transform 0.4s ease;
        }
        
        .project-card:hover { transform: translateY(-10px); }

        .card-image-wrapper {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
        }

        .card-image-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .project-card:hover img { transform: scale(1.05); }

        .card-tags {
            display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.8rem;
        }
        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--text-sec);
            opacity: 0.7;
        }

        .card-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card-desc { color: var(--text-sec); font-size: 0.95rem; }

        /* Icono de Play para videos */
        .play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); opacity: 0; transition: 0.3s;
        }
        .project-card:hover .play-overlay { opacity: 1; }
        .play-icon { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }

        /* --- 6. MODAL MEJORADO --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: 0.4s;
            display: grid; place-items: center;
            padding: 2rem;
        }
        .modal.active { opacity: 1; pointer-events: all; }

        .modal-content {
            width: 100%; max-width: 1100px;
            height: 85vh;
            background: var(--bg-color);
            border-radius: var(--radius);
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            overflow: hidden;
            position: relative;
        }

        .modal-media {
            background: #000;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        
        .modal-info {
            padding: 3rem;
            overflow-y: auto;
            color: var(--text-main);
        }

        /* Carrusel Controles */
        .slide { display: none; width: 100%; height: 100%; }
        .slide.active { display: block; }
        .slide img { width: 100%; height: 100%; object-fit: contain; }
        .slide iframe { width: 100%; height: 100%; border: none; }

        .carousel-nav {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; gap: 10px;
        }
        .nav-btn {
            width: 40px; height: 40px;
            background: white; border: none; border-radius: 50%;
            cursor: pointer; opacity: 0.8; font-weight: bold;
        }
        .nav-btn:hover { opacity: 1; transform: scale(1.1); }

        .close-modal {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); color: var(--text-main);
            border-radius: 50%; border: none; cursor: pointer;
            z-index: 10; font-size: 1.5rem;
        }

        /* --- 7. RESPONSIVE --- */
        @media (max-width: 900px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; }
            .hero-grid img { width: 200px; margin: 0 auto; box-shadow: none; border: 4px solid var(--accent); }
            .social-links { justify-content: center; }
            .modal-content { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .modal-info { padding: 1.5rem; }
        }
    </style>
</head>
<body class="loading">

    <div class="bg-pattern"></div>

    <div class="container">
        <header id="header-section" class="fade-in-up">
            <div class="hero-grid">
                <div class="hero-text">
                    <span class="hero-role" id="p-rol">Diseñadora</span>
                    <h1 id="p-nombre">Cargando...</h1>
                    <p class="hero-bio" id="p-bio">...</p>
                    <div class="social-links" id="social-container">
                        </div>
                </div>
                <div class="hero-image">
                    <img id="p-foto" src="" alt="Perfil" class="profile-photo">
                </div>
            </div>
        </header>

        <section class="projects-section">
            <h2 class="section-title fade-in-up">Proyectos Seleccionados</h2>
            <div id="projects-container" class="projects-grid">
                </div>
        </section>

        <footer style="text-align: center; padding: 2rem; opacity: 0.5; font-size: 0.8rem;">
            &copy; <span id="year"></span> Portafolio.
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            
            <div class="modal-media">
                <div id="carousel-track" style="width: 100%; height: 100%;"></div>
                <div class="carousel-nav">
                    <button class="nav-btn" onclick="moveSlide(-1)">←</button>
                    <button class="nav-btn" onclick="moveSlide(1)">→</button>
                </div>
            </div>
            
            <div class="modal-info">
                <div id="m-tags" class="card-tags" style="margin-bottom: 1rem;"></div>
                <h2 id="m-title" style="font-size: 2.5rem; margin-bottom: 0.5rem; line-height: 1;"></h2>
                <span id="m-date" style="color: var(--accent); font-weight: bold; display: block; margin-bottom: 2rem;"></span>
                <p id="m-desc" style="white-space: pre-line; font-size: 1rem; color: var(--text-sec);"></p>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // Pega aquí el ID de tu Google Sheet
        const SHEET_ID = '1z7X1BK7JfClh0hNNLktqEFCh7m4Ispmrs9LWagZ3BS4'; 
        const GID_PROYECTOS = '699907319';
        
        // --- LÓGICA ---
        const URL_PERFIL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`; 
        const URL_PROYECTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_PROYECTOS}`;

        let projectsData = [];
        let currentSlides = [];
        let currentSlideIndex = 0;

        // Iconos SVG simples
        const ICONS = {
            instagram: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>`,
            behance: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7H17V9H22V7ZM23.73 17C23.29 18.3 21.7 20 18.63 20C15.56 20 13.07 18.27 13.07 14.33C13.07 10.42 15.39 8.41 18.53 8.41C21.61 8.41 23.49 10.19 23.9 12.83C23.98 13.34 24.01 14.02 24 14.97H15.97C16.1 18.18 19.45 18.28 20.56 17H23.73ZM16.04 13H21.01C20.9 11.45 19.87 10.78 18.53 10.78C17.06 10.78 16.25 11.55 16.04 13ZM6.47 13.99H2.88V6.99H6.47C8.98 6.99 9.38 3.99 6.16 3.99H2.89V1H6.38V3.99C9.44 3.99 9.25 .97 6.4 1"></path></svg>`,
            linkedin: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`,
            email: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`,
            default: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`
        };

        function init() {
            document.getElementById('year').textContent = new Date().getFullYear();

            // 1. Cargar Perfil y Estilos
            Papa.parse(URL_PERFIL, {
                download: true,
                header: true,
                complete: (results) => {
                    const perfil = processProfileData(results.data);
                    applyStylesAndContent(perfil);
                    
                    // 2. Cargar Proyectos tras tener los estilos
                    loadProjects();
                }
            });
        }

        function processProfileData(data) {
            const perfil = {};
            data.forEach(row => {
                if(row['Clave (no tocar)'] && row['Valor']) {
                    perfil[row['Clave (no tocar)'].trim().toLowerCase()] = row['Valor'].trim();
                }
            });
            return perfil;
        }

        function applyStylesAndContent(perfil) {
            const r = document.documentElement.style;

            // -- Personalización Visual (Sheet-Driven) --
            if (perfil.color_fondo) r.setProperty('--bg-color', perfil.color_fondo);
            if (perfil.color_texto) r.setProperty('--text-main', perfil.color_texto);
            if (perfil.color_secundario) r.setProperty('--text-sec', perfil.color_secundario);
            if (perfil.color_acento) r.setProperty('--accent', perfil.color_acento);
            if (perfil.borde_radio) r.setProperty('--radius', perfil.borde_radio);
            
            // Fuentes
            if (perfil.fuente_titulo) r.setProperty('--font-title', `"${perfil.fuente_titulo}", serif`);
            if (perfil.fuente_cuerpo) r.setProperty('--font-body', `"${perfil.fuente_cuerpo}", sans-serif`);

            // -- Contenido --
            setText('p-nombre', perfil.nombre);
            setText('p-rol', perfil.rol);
            setText('p-bio', perfil.intro_section || perfil.bio); // Soporta ambas claves
            if (perfil.foto) document.getElementById('p-foto').src = perfil.foto;

            // Titulo de la pestaña
            document.title = `${perfil.nombre || 'Portafolio'} - ${perfil.rol || 'Diseño'}`;

            // Redes Sociales
            const socialContainer = document.getElementById('social-container');
            const redes = ['instagram', 'behance', 'linkedin', 'email', 'tiktok'];
            
            redes.forEach(red => {
                if(perfil[red]) {
                    let href = perfil[red];
                    if(red === 'email') href = `mailto:${perfil[red]}`;
                    
                    const icon = ICONS[red] || ICONS.default;
                    const a = document.createElement('a');
                    a.className = 'social-btn';
                    a.href = href;
                    a.target = '_blank';
                    a.innerHTML = icon;
                    socialContainer.appendChild(a);
                }
            });
        }

        function loadProjects() {
            Papa.parse(URL_PROYECTOS, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    projectsData = results.data;
                    renderProjects(results.data);
                    
                    // Finalizar carga
                    document.body.classList.remove('loading');
                    initAnimations();
                }
            });
        }

        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            
            container.innerHTML = projects.map((p, idx) => {
                if(!p.titulo) return '';

                // Imágenes
                const galeria = p.galeria ? p.galeria.split(',') : [p.imagen];
                const thumb = getThumbnail(galeria[0]);
                const isVideo = thumb.includes('youtube');
                
                // Tags
                let tagsHtml = '';
                if(p.tags) {
                    const tags = p.tags.split(',').slice(0, 3); // Max 3 tags
                    tagsHtml = tags.map(t => `<span class="tag">${t.trim()}</span>`).join('');
                }

                return `
                <article class="project-card fade-in-up" onclick="openModal(${idx})" style="transition-delay: ${idx * 100}ms">
                    <div class="card-image-wrapper">
                        <img src="${isVideo ? getYoutubeThumb(thumb) : thumb}" loading="lazy" alt="${p.titulo}">
                        ${isVideo ? `<div class="play-overlay"><div class="play-icon">▶</div></div>` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-tags">${tagsHtml}</div>
                        <h3 class="card-title">${p.titulo}</h3>
                        <p class="card-desc">${p.desc_corta || ''}</p>
                    </div>
                </article>
                `;
            }).join('');
        }

        // --- FUNCIONES UTILITARIAS ---
        function setText(id, txt) { if(document.getElementById(id) && txt) document.getElementById(id).textContent = txt; }
        
        function getThumbnail(url) {
            if(!url) return 'https://via.placeholder.com/800x600?text=No+Image';
            return url.trim();
        }

        function getYoutubeThumb(url) {
            const id = getYouTubeID(url);
            return id ? `https://img.youtube.com/vi/${id}/maxresdefault.jpg` : url;
        }

        function getYouTubeID(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- ANIMACIONES (INTERSECTION OBSERVER) ---
        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
        }

        // --- MODAL & CARRUSEL ---
        window.openModal = (idx) => {
            const p = projectsData[idx];
            currentSlides = p.galeria ? p.galeria.split(',').map(s=>s.trim()) : [p.imagen];
            currentSlideIndex = 0;

            document.getElementById('m-title').textContent = p.titulo;
            document.getElementById('m-desc').textContent = p.desc_larga;
            document.getElementById('m-date').textContent = p.fecha;
            
            // Tags en modal
            const tagsContainer = document.getElementById('m-tags');
            tagsContainer.innerHTML = p.tags ? p.tags.split(',').map(t => `<span class="tag" style="border-color:var(--accent)">${t.trim()}</span>`).join('') : '';

            renderSlide();
            
            // Mostrar flechas solo si hay más de 1 slide
            document.querySelector('.carousel-nav').style.display = currentSlides.length > 1 ? 'flex' : 'none';
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = () => {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('carousel-track').innerHTML = ''; // Parar videos
            document.body.style.overflow = 'auto';
        }

        window.moveSlide = (dir) => {
            currentSlideIndex = (currentSlideIndex + dir + currentSlides.length) % currentSlides.length;
            renderSlide();
        }

        function renderSlide() {
            const container = document.getElementById('carousel-track');
            const url = currentSlides[currentSlideIndex];
            
            let content = '';
            if(url.includes('youtu')) {
                const id = getYouTubeID(url);
                content = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                content = `<img src="${url}" alt="Project Slide">`;
            }
            
            container.innerHTML = `<div class="slide active fade-in-up visible">${content}</div>`;
        }

        // Click outside closes modal
        document.getElementById('modal').addEventListener('click', (e) => {
           if(e.target === document.getElementById('modal')) closeModal();
        });

        // Init
        init();

    </script>
</body>
</html>
