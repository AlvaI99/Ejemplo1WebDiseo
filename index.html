<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Minimalista</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        /* --- VARIABLES DINÁMICAS --- */
        :root {
            /* Colores por defecto adaptados al mockup minimalista */
            --header-bg: transparent;
            --header-text: #333333;
            --body-bg: #F4F3EE; /* Tono beige claro de la imagen */
            --body-text: #333333;
            --footer-bg: #6B705C; /* Verde oliva del footer */
            --footer-text: #ffffff;
            --accent: #1A2E1F; /* Verde oscuro para botones */
            
            --font-title: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --radius: 0px; /* Bordes rectos para un look más editorial */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-body); 
            line-height: 1.6; 
            background-color: var(--body-bg);
            color: var(--body-text);
            overflow-x: hidden;
            transition: opacity 0.5s;
        }
        body.loading { opacity: 0; pointer-events: none; }
        
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        img { display: block; max-width: 100%; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }

        /* --- TOP NAV --- */
        .top-nav {
            padding: 2rem 2rem 0;
            max-width: 1000px;
            margin: 0 auto;
        }
        .site-title {
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 3rem 0 5rem;
        }

        .header-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
            margin-top: 2rem;
        }

        .profile-photo {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            object-fit: cover;
        }

        .bio-text {
            font-family: var(--font-title);
            font-size: 1.4rem;
            line-height: 1.5;
            color: #444;
        }

        .hidden-data { display: none; }

        main {
            padding: 2rem 0 6rem;
        }

        .projects-wrapper {
            margin-left: auto;
            margin-right: 0;
            width: 100%;
            max-width: 650px; 
        }

        #p-intro-section {
            text-align: left;
            margin: 0 0 4rem 0; 
            width: 100%;
            max-width: 100%;
            font-size: 1.6rem;
            font-style: italic;
            font-family: var(--font-title);
            line-height: 1.3;
            color: var(--body-text);
        }
        
        .projects-grid {
            display: flex;
            flex-direction: column;
        }
        
        .card {
            background: transparent;
            border-top: 1px solid rgba(0,0,0,0.2);
            padding: 3rem 0;
            cursor: pointer;
            transition: opacity 0.3s ease;
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 3rem;
            align-items: start;
        }}

        .card:hover { opacity: 0.7; }
        
        .card-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            height: 100%;
        }

        .card-date {
            font-family: var(--font-body);
            color: var(--body-text);
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 2.2rem;
            margin-bottom: 2rem;
            line-height: 1.1;
            font-weight: 400;
        }

        .read-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .card-thumb {
            aspect-ratio: 16/10;
            width: 100%;
            background: #e0e0e0;
            position: relative;
        }
        
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            backdrop-filter: blur(2px);
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--footer-bg);
            color: var(--footer-text);
            padding: 3rem 0;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.9rem;
        }

        .footer-left p { margin-bottom: 0.2rem; }
        .footer-left .site-title-footer { font-weight: 700; margin-bottom: 0.5rem; }

        .social-container {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
        }

        .social-text-link {
            text-decoration: underline;
            text-underline-offset: 4px;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .social-text-link:hover { opacity: 0.7; }

        /* --- MODAL (CARRUSEL MANTENIDO) --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            opacity: 0; pointer-events: none;
            transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
            padding: 1rem;
        }
        .modal.active { opacity: 1; pointer-events: all; }

        .modal-container {
            width: 100%; max-width: 1000px;
            background: #111;
            overflow: hidden;
            display: flex; flex-direction: column;
            max-height: 90vh;
        }

        .carousel-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
            width: 100%;
        }

        .slide { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .slide.active { display: flex; }
        .slide img { max-height: 100%; width: auto; }
        .slide iframe { width: 100%; height: 100%; border: none; }

        .c-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white;
            border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem; z-index: 10;
        }
        .c-btn:hover { background: #fff; color: black; }
        .c-prev { left: 1rem; }
        .c-next { right: 1rem; }

        .modal-details { padding: 2rem; overflow-y: auto; color: #fff; }
        .close-modal {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.2); color: white;
            border: none; width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; z-index: 20;
        }
        .close-modal:hover { background: red; }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .profile-photo { aspect-ratio: auto; max-height: 50vh; }
            
            /* Restablecemos el contenedor para que ocupe todo el ancho en móvil */
            .projects-wrapper {
                max-width: 100%;
                margin-left: 0;
            }

            /* Cambiamos a flex para apilar los elementos verticalmente */
            .card {
                display: flex;
                flex-direction: column;
                gap: 0;
                padding: 2rem 0;
            }
            
            /* Hacemos la imagen más pequeña, la mandamos arriba y la alineamos a la derecha */
            .card-thumb { 
                order: -1; /* Mueve la imagen arriba del texto */
                width: 75%; /* Reduce el tamaño para que no ocupe todo el ancho */
                margin-left: auto; /* La empuja hacia la derecha */
                aspect-ratio: 16/10; 
                margin-bottom: 1.5rem;
            }
            
            /* El texto se acomoda naturalmente debajo */
            .card-content {
                width: 100%;
                align-items: flex-start;
            }

            #p-intro-section { max-width: 100%; margin-bottom: 3rem; }
            
            .footer-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
            }
        }
    </style>
</head>
<body class="loading">

    <div class="top-nav">
        <h1 id="p-nombre" class="site-title">Cargando...</h1>
    </div>

    <header>
        <div class="container header-content">
            <div class="profile-photo-container">
                <img id="p-foto" src="" alt="Perfil" class="profile-photo">
            </div>
            
            <div class="profile-info">
                <p class="bio-text" id="p-bio">...</p>
                
                <div class="hidden-data">
                    <span id="p-rol"></span>
                    <span id="p-ubicacion"></span>
                    <span id="p-experiencia"></span>
                    <span id="p-especialidad"></span>
                    <span id="p-disponibilidad"></span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="projects-wrapper">
                <p id="p-intro-section"></p>
                <div id="projects-container" class="projects-grid"></div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container footer-content">
            <div class="footer-left">
                <p class="site-title-footer">Claudia Liz</p>
                <p>Copyright © 2026</p>
                <p id="p-footer-text">claudializop@gmail.com</p> 
            </div>
            <div id="social-container" class="social-container">
                </div>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="carousel-wrapper">
                <button class="close-modal" onclick="closeModal()">×</button>
                <button class="c-btn c-prev" onclick="moveSlide(-1)">❮</button>
                <div id="carousel-track" style="width: 100%; height: 100%;"></div>
                <button class="c-btn c-next" onclick="moveSlide(1)">❯</button>
            </div>
            <div class="modal-details">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <h2 id="m-title" style="margin:0; font-family: var(--font-title);"></h2>
                    <span id="m-date" style="color: #aaa; font-family: var(--font-body); font-size: 0.8rem;"></span>
                </div>
                <p id="m-desc" style="white-space: pre-line; color: #ccc;"></p>
            </div>
        </div>
    </div>
    
    <script>
        // --- CONFIGURACIÓN ---
        const SHEET_ID = '1z7X1BK7JfClh0hNNLktqEFCh7m4Ispmrs9LWagZ3BS4'; 
        const GID_PROYECTOS = '699907319';
        
        // --- LÓGICA ---
        const URL_PERFIL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`; 
        const URL_PROYECTOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_PROYECTOS}`;

        let projectsData = [];
        let currentSlides = [];
        let currentSlideIndex = 0;

        function init() {
            Papa.parse(URL_PERFIL, {
                download: true, header: true,
                complete: (res) => processProfile(res.data)
            });
            Papa.parse(URL_PROYECTOS, {
                download: true, header: true, skipEmptyLines: true,
                complete: (res) => renderProjects(res.data)
            });
        }

        function processProfile(data) {
            const perfil = {};
            data.forEach(row => {
                if(row['Clave (no tocar)']) perfil[row['Clave (no tocar)'].trim().toLowerCase()] = row['Valor'];
            });

            // Textos Simples
            ['nombre', 'rol', 'ubicacion', 'experiencia', 'especialidad', 'disponibilidad', 'bio', 'intro_section'].forEach(key => {
                if(perfil[key]) {
                    const idMap = { 'bio': 'p-bio', 'intro_section': 'p-intro-section' };
                    const elId = idMap[key] || `p-${key}`;
                    const el = document.getElementById(elId);
                    
                    if(el) {
                        el.innerHTML = perfil[key].replace(/\n/g, '<br>');
                    }
                }
            });
            
            if (document.getElementById('p-footer-text') && perfil.email) {
                document.getElementById('p-footer-text').textContent = perfil.email;
            }
            
            if(perfil.foto) document.getElementById('p-foto').src = perfil.foto;

            // --- APLICAR COLORES POR SECCIÓN ---
            const root = document.documentElement.style;
            if(perfil.header_bg) root.setProperty('--header-bg', perfil.header_bg);
            if(perfil.header_text) root.setProperty('--header-text', perfil.header_text);
            if(perfil.body_bg) root.setProperty('--body-bg', perfil.body_bg);
            if(perfil.body_text) root.setProperty('--body-text', perfil.body_text);
            if(perfil.footer_bg) root.setProperty('--footer-bg', perfil.footer_bg);
            if(perfil.footer_text) root.setProperty('--footer-text', perfil.footer_text);
            if(perfil.acento) root.setProperty('--accent', perfil.acento);

            // --- REDES SOCIALES MODO MINIMALISTA ---
            const socialContainer = document.getElementById('social-container');
            const redes = ['linkedin', 'behance', 'instagram', 'whatsapp'];
            
            redes.forEach(red => {
                if(perfil[red]) {
                    let href = perfil[red];
                    let label = red;

                    if(red === 'whatsapp') {
                        const num = perfil[red].replace(/\D/g,'');
                        href = `https://wa.me/${num}`;
                        label = 'WhatsApp';
                    }

                    socialContainer.innerHTML += `
                        <a href="${href}" target="_blank" class="social-text-link">
                            ${label.charAt(0).toUpperCase() + label.slice(1)}
                        </a>`;
                }
            });
            document.body.classList.remove('loading');
        }

        function renderProjects(data) {
            projectsData = data;
            const container = document.getElementById('projects-container');
            
            container.innerHTML = data.map((p, index) => {
                if(!p.titulo) return '';
                
                const mediaList = p.galeria ? p.galeria.split(',') : [p.imagen];
                const firstMedia = mediaList[0].trim();
                const isVideoYT = firstMedia.includes('youtu');
                const isDrive = firstMedia.includes('drive.google.com');
                
                let thumb = firstMedia;
                let isPlayable = isVideoYT;

                if (isVideoYT) {
                    thumb = getYouTubeThumb(firstMedia);
                } else if (isDrive) {
                    const driveId = getDriveID(firstMedia);
                    if (driveId) thumb = `https://drive.google.com/uc?export=view&id=${driveId}`;
                    isPlayable = true; 
                }
                
                return `
                <article class="card" onclick="openModal(${index})">
                    <div class="card-content">
                        <span class="card-date">${p.fecha || ''}</span>
                        <h3 class="card-title">${p.titulo}</h3>
                        <button class="read-btn">Saber más</button>
                    </div>
                    <div class="card-thumb">
                        <img src="${thumb}" alt="${p.titulo}" onerror="this.src='https://via.placeholder.com/600x400?text=Cargando...'">
                        ${isPlayable ? '<div class="play-icon">▶</div>' : ''}
                    </div>
                </article>
                `;
            }).join('');
        }

        /* --- LÓGICA DE VIDEO Y CARRUSEL --- */
        function getYouTubeID(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function getYouTubeThumb(url) {
            const id = getYouTubeID(url);
            return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : url;
        }

        function getDriveID(url) {
            const match = url.match(/\/d\/(.+?)\/|(?:id=)([^&]+)/);
            return match ? (match[1] || match[2]) : null;
        }

        window.openModal = function(index) {
            const p = projectsData[index];
            currentSlides = p.galeria ? p.galeria.split(',').map(s => s.trim()) : [p.imagen];
            currentSlideIndex = 0;

            document.getElementById('m-title').textContent = p.titulo;
            document.getElementById('m-date').textContent = p.fecha;
            document.getElementById('m-desc').textContent = p.desc_larga;

            renderSlide();
            
            const btns = document.querySelectorAll('.c-btn');
            btns.forEach(b => b.style.display = currentSlides.length > 1 ? 'block' : 'none');

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function renderSlide() {
            const track = document.getElementById('carousel-track');
            const url = currentSlides[currentSlideIndex];
            
            let content = '';
            if(url.includes('youtu')) {
                const id = getYouTubeID(url);
                content = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            } else if (url.includes('drive.google.com')) {
                const id = getDriveID(url);
                if (id) {
                    content = `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay" allowfullscreen></iframe>`;
                } else {
                    content = `<p style="color:white; text-align:center;">Enlace de Drive no válido</p>`;
                }
            } else {
                content = `<img src="${url}">`;
            }
            
            track.innerHTML = `<div class="slide active">${content}</div>`;
        }

        window.moveSlide = function(dir) {
            currentSlideIndex = (currentSlideIndex + dir + currentSlides.length) % currentSlides.length;
            renderSlide();
        }

        window.closeModal = function() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('carousel-track').innerHTML = ''; 
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modal')) closeModal();
        });

        init();
    </script>
</body>
</html>
